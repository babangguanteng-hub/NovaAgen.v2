name: Android CI Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode
      uses: actions/checkout@v4

    - name: Siapkan Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Siapkan Mesin
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Rakit APK dan Rekam Log
      # Kita alihkan semua teks hitam ke file error_log.txt, lalu kita paksa jalan terus (|| true)
      run: gradle assembleDebug --stacktrace > error_log.txt 2>&1 || true

    - name: TAMPILKAN ERROR KE LAYAR
      run: |
        echo "### 🚨 INI DIA BIANG KEROKNYA 🚨 ###" >> $GITHUB_STEP_SUMMARY
        echo "Berikut adalah 150 baris terakhir dari log error. Tolong salin teks di bawah ini:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
        tail -n 150 error_log.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        # Jika ada kata FAILED, baru kita gagalkan prosesnya agar ditandai merah
        if grep -q "FAILED" error_log.txt; then exit 1; fi

    - name: Simpan APK
      uses: actions/upload-artifact@v4
      with:
        name: NovaAgent-APK
        path: app/build/outputs/apk/debug/app-debug.apk

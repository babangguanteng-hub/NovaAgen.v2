# Build Pemicu Otomatis: 1780885941
name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode dari Repositori
      uses: actions/checkout@v4

    - name: Siapkan Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Konfigurasi Sistem Perakit
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Jalankan Perakitan dan Tangkap Error Kode
      run: |
        echo "Memulai kompilasi kode aplikasi..."
        gradle assembleDebug --no-daemon > gradle_build.log 2>&1 || true
        cat gradle_build.log
        
        # Jika proses build gagal, ekstrak error kodenya langsung ke halaman depan (Summary)
        if grep -q "BUILD FAILED" gradle_build.log; then
          echo "### 🔍 DETAIL KESALAHAN KODE JAVA ANDA 🔍" >> $GITHUB_STEP_SUMMARY
          echo "Mesin perakit menemukan kesalahan penulisan pada file Java Anda. Berikut detailnya:" >> $GITHUB_STEP_SUMMARY
          echo "```text" >> $GITHUB_STEP_SUMMARY
          grep -B 1 -A 5 "error:" gradle_build.log >> $GITHUB_STEP_SUMMARY || grep -B 2 -A 5 "FAILED" gradle_build.log >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: Simpan dan Unggah Berkas APK
      uses: actions/upload-artifact@v4
      with:
        name: NovaAgent-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

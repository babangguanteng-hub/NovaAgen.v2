name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode dari Repositori
      uses: actions/checkout@v4

    - name: Siapkan Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Pasang Gradle Resmi (Versi 8.4)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Jalankan Build APK dengan Gradle Global
      # Menggunakan "gradle" secara langsung, bukan "./gradlew" lokal
      run: gradle assembleDebug --no-daemon --stacktrace

    - name: Simpan dan Unggah Berkas APK jika Sukses
      uses: actions/upload-artifact@v4
      with:
        name: NovaAgent-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

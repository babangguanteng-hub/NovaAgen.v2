name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode dari Repositori
      uses: actions/checkout@v4

    - name: Siapkan Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Kita jalankan compile secara langsung dan menyaring pesan "error:" agar langsung terlihat
    - name: Pasang Gradle dan Rakit APK
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'
        arguments: assembleDebug --no-daemon --info
      continue-on-error: true

    # Perintah khusus untuk mencari tulisan "error" atau "FAILED" di baris program Java Anda
    - name: Tampilkan Baris Error Kode Secara Jelas
      run: |
        echo "=== HASIL PEMINDAIAN ERROR KODE ==="
        find app/src/ -name "*.java" -o -name "*.xml" | xargs grep -n "error" || echo "Pindai manual file Java selesai."
        echo "==================================="
